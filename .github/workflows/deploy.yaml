name: Symfony Preprod CI

on:
    push:
        tags:
            - 'v*.*.*'

jobs:
    ci:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8
                env:
                    MYSQL_ROOT_PASSWORD: root
                    MYSQL_DATABASE: app_test
                ports:
                    - 3306:3306
                options: >-
                    --health-cmd="mysqladmin ping --silent"
                    --health-interval=5s
                    --health-timeout=5s
                    --health-retries=10

        steps:
            # =========================
            # CHECKOUT
            # =========================
            - name: Checkout code
              uses: actions/checkout@v4

            # =========================
            # TAG SAFETY (optionnel)
            # =========================
            - name: Verify tag source branch
              run: |
                  git fetch origin develop
                  if ! git branch -r --contains $GITHUB_SHA | grep origin/develop; then
                    echo "❌ Tag must come from develop branch"
                    exit 1
                  fi

            # =========================
            # PHP
            # =========================
            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: mbstring, intl, pdo_mysql, opcache
                  coverage: none

            # =========================
            # COMPOSER
            # =========================
            - name: Validate composer
              run: composer validate

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            # =========================
            # ENV TEST
            # =========================
            - name: Setup environment
              run: |
                  cp .env .env.test || true
                  echo "APP_ENV=test" >> .env.test
                  echo "APP_DEBUG=0" >> .env.test
                  echo "DATABASE_URL=mysql://root:root@127.0.0.1:3306/app_test?serverVersion=8.0" >> .env.test
                  echo "APP_SECRET=ci_secret" >> .env.test

            # =========================
            # WAIT MYSQL
            # =========================
            - name: Wait for MySQL
              run: |
                  until mysqladmin ping -h"127.0.0.1" --silent; do
                    sleep 2
                  done

            # =========================
            # SYMFONY CHECKS
            # =========================
            - name: Symfony container lint
              run: php bin/console lint:container --env=test

            - name: Symfony twig lint
              run: php bin/console lint:twig templates --env=test

            - name: Symfony yaml lint
              run: php bin/console lint:yaml config --env=test

            # =========================
            # DB RESET (FIX TON BUG)
            # =========================
            - name: Drop database
              run: php bin/console doctrine:database:drop --force --if-exists --env=test

            - name: Create database
              run: php bin/console doctrine:database:create --if-not-exists --env=test

            # =========================
            # MIGRATIONS (SAFE)
            # =========================
            #- name: Run migrations
            #  run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

            # =========================
            # CACHE
            # =========================
            - name: Clear cache
              run: php bin/console cache:clear --env=test

            # =========================
            # QUALITY TOOLS
            # =========================
            - name: PHPStan
              run: |
                  if [ -f vendor/bin/phpstan ]; then
                    vendor/bin/phpstan analyse src --level=6
                  fi

            - name: PHP-CS-Fixer
              run: |
                  if [ -f vendor/bin/php-cs-fixer ]; then
                    vendor/bin/php-cs-fixer fix --dry-run --diff
                  fi

            # =========================
            # TESTS
            # =========================
            - name: PHPUnit
              run: php bin/phpunit --fail-on-warning --fail-on-risky
