name: Symfony CI

on:
    push:
        branches: [develop]

jobs:
    ci:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15
                env:
                    POSTGRES_USER: root
                    POSTGRES_PASSWORD: root
                    POSTGRES_DB: app_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd="pg_isready -U root"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.4
                  extensions: intl, pdo_pgsql, zip, opcache

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Set test DB
              run: echo "DATABASE_URL="postgresql://nour_dicko_academy_user:qVMO2ozMHyAfzJKRCmkPRmi97SOSHOQd@dpg-d92er5urnols739281g0-a.virginia-postgres.render.com:5432/nour_dicko_academy?sslmode=require" > .env.test

            - name: Cache clear
              run: APP_ENV=test php bin/console cache:clear

            - name: Database schema sync
              run: APP_ENV=test php bin/console doctrine:schema:update --force

            - name: Tests
              run: php bin/phpunit
