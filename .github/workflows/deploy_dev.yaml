name: Symfony CI

on:
    push:
        branches: [develop]

jobs:
    ci:
        runs-on: ubuntu-latest

        services:
            mysql:
                image: mysql:8
                env:
                    MYSQL_ROOT_PASSWORD: root
                ports:
                    - 3306:3306

        steps:
            - uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.5
                  extensions: intl, pdo_mysql

            - name: Install dependencies
              run: composer install --no-interaction --prefer-dist --no-progress

            - name: Create DB
              run: mysql -h 127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS app_test;"

            - name: Cache clear
              run: php bin/console cache:clear --env=test

            - name: Migrations
              run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

            - name: Tests
              run: php bin/phpunit
