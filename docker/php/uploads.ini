; Limites relevées pour permettre l'upload des enregistrements vidéo de séances.
; Les valeurs par défaut de PHP (upload_max_filesize=2M, post_max_size=8M) sont
; bien trop basses pour un fichier vidéo.
upload_max_filesize = 2048M
post_max_size = 2200M
memory_limit = 2200M
max_execution_time = 1200
